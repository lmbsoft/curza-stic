<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#03070b">
<title>Estación Meteorológica · Gemini Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #03070b; --ink: #eaf3ec; --muted: #7b9385;
    --accent: #00d2ff; --accent-glow: rgba(0, 210, 255, 0.4);
    --ok: #20e253; --warn: #ffcc44; --danger: #ff4757;
    --glass-bg: rgba(10, 18, 27, 0.65);
    --glass-border: rgba(255, 255, 255, 0.1);
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    font-synthesis: none;
  }
  
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  html, body { 
    margin: 0; height: 100%; background: var(--bg); color: var(--ink);
    font-family: 'Inter', sans-serif; overflow: hidden;
  }

  .layout { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 1fr 220px; height: 100vh; width: 100vw; }

  /* --- Renderizador 3D --- */
  .viewport { grid-column: 2; grid-row: 1 / 3; position: relative; width: 100%; height: 100%; }
  #canvas3d { width: 100%; height: 100%; display: block; }
  
  /* Gradiente base para el cielo (cambia por JS) */
  .sky { position: absolute; inset: 0; z-index: -1; transition: background 1s; }

  /* --- Glass Panels --- */
  .panel {
    background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    z-index: 10; display: flex; flex-direction: column; gap: 16px;
  }

  /* --- Sidebar (Controles Climáticos) --- */
  .sidebar {
    grid-column: 1; grid-row: 1 / 3; border-right: 1px solid var(--glass-border); padding: 20px;
    overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.3);
  }
  
  .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-weight: 800; font-size: 16px; text-transform: uppercase; }
  .brand span { color: var(--accent); }
  .badge { background: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; }

  .ctrl-group { background: rgba(0,0,0,0.2); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
  .ctrl-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .ctrl-head h3 { margin: 0; font-size: 12px; color: var(--accent); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
  .ctrl-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
  
  input[type=range] {
    -webkit-appearance: none; width: 100%; background: transparent; margin: 8px 0;
  }
  input[type=range]::-webkit-slider-runnable-track {
    width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
    background: var(--accent); cursor: pointer; margin-top: -5px; box-shadow: 0 0 10px var(--accent-glow);
  }

  /* --- Bottom Bar (Datalogger) --- */
  .datalogger {
    grid-column: 2; grid-row: 2; border-top: 1px solid var(--glass-border);
    margin: 20px; border-radius: 16px; padding: 16px;
    display: grid; grid-template-columns: auto 1fr auto; gap: 20px;
  }

  /* Radar */
  .radar-box { width: 150px; height: 150px; border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); position: relative; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
  #radar-canvas { width: 100%; height: 100%; display: block; }
  .radar-box::after {
    content: ""; position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
    background: linear-gradient(rgba(0,210,255,0.1) 1px, transparent 1px) 50% 50% / 100% 50% no-repeat,
                linear-gradient(90deg, rgba(0,210,255,0.1) 1px, transparent 1px) 50% 50% / 50% 100% no-repeat;
  }

  /* Metrics */
  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; align-content: center; }
  .metric { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: center;}
  .metric .k { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 4px; }
  .metric .v { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: #fff; }
  .metric .u { font-size: 12px; color: var(--muted); }

  /* Forecast & Export */
  .sys-panel { display: flex; flex-direction: column; gap: 10px; justify-content: center; min-width: 200px; }
  .forecast { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
  .forecast .k { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 800; }
  .forecast .v { font-size: 14px; font-weight: 600; margin-top: 4px; display: flex; align-items: center; gap: 6px;}

  .btn {
    background: linear-gradient(180deg, var(--accent), #0099cc); border: none; padding: 10px 16px;
    border-radius: 8px; color: #000; font-weight: 800; font-size: 12px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.1s, filter 0.2s; box-shadow: 0 4px 15px var(--accent-glow);
  }
  .btn:active { transform: scale(0.95); }
  .btn:hover { filter: brightness(1.2); }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; height: 100dvh; overflow-y: auto; }
    .viewport { grid-column: 1; grid-row: 2; min-height: 400px; }
    .sidebar { grid-column: 1; grid-row: 1; border-right: none; border-bottom: 1px solid var(--glass-border); padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .brand { grid-column: span 2; }
    .datalogger { grid-column: 1; grid-row: 3; margin: 10px; padding: 12px; grid-template-columns: auto 1fr; }
    .sys-panel { grid-column: span 2; flex-direction: row; }
    .radar-box { width: 100px; height: 100px; }
  }
</style>
</head>
<body>

<div class="layout">
  
  <div class="sidebar panel">
    <div class="brand">🌤️ Gemini <span class="badge">PRO</span> <span>Weather</span></div>
    
    <div class="ctrl-group">
      <div class="ctrl-head"><h3>Hora del Día</h3><span class="ctrl-val" id="val-time">12:00</span></div>
      <input type="range" id="in-time" min="0" max="24" step="0.1" value="12">
    </div>

    <div class="ctrl-group">
      <div class="ctrl-head"><h3>Viento</h3><span class="ctrl-val" id="val-wind">15 km/h</span></div>
      <input type="range" id="in-wind-spd" min="0" max="100" step="1" value="15">
      <div class="ctrl-head" style="margin-top:10px"><h3>Dirección</h3><span class="ctrl-val" id="val-wind-dir">45° NE</span></div>
      <input type="range" id="in-wind-dir" min="0" max="360" step="1" value="45">
    </div>

    <div class="ctrl-group">
      <div class="ctrl-head"><h3>Precipitación</h3><span class="ctrl-val" id="val-rain">0 mm/h</span></div>
      <input type="range" id="in-rain" min="0" max="50" step="0.5" value="0">
    </div>

    <div class="ctrl-group">
      <div class="ctrl-head"><h3>Temperatura Base</h3><span class="ctrl-val" id="val-temp">22.0 °C</span></div>
      <input type="range" id="in-temp" min="-10" max="45" step="0.5" value="22">
    </div>
  </div>

  <div class="viewport">
    <div class="sky" id="sky-bg"></div>
    <canvas id="canvas3d"></canvas>
  </div>

  <div class="datalogger panel">
    <div class="radar-box"><canvas id="radar-canvas"></canvas></div>
    
    <div class="metrics-grid">
      <div class="metric"><div class="k">Temperatura</div><div><span class="v" id="out-temp">--</span><span class="u"> °C</span></div></div>
      <div class="metric"><div class="k">Humedad</div><div><span class="v" id="out-hum">--</span><span class="u"> %</span></div></div>
      <div class="metric"><div class="k">Presión</div><div><span class="v" id="out-pres">--</span><span class="u"> hPa</span></div></div>
      <div class="metric"><div class="k">Viento</div><div><span class="v" id="out-wind">--</span><span class="u"> km/h</span></div></div>
      <div class="metric"><div class="k">Lluvia Acum.</div><div><span class="v" id="out-rain">--</span><span class="u"> mm</span></div></div>
      <div class="metric"><div class="k">Radiación</div><div><span class="v" id="out-rad">--</span><span class="u"> W/m²</span></div></div>
    </div>

    <div class="sys-panel">
      <div class="forecast">
        <div class="k">Pronóstico Local</div>
        <div class="v" id="out-forecast">⛅ Analizando...</div>
      </div>
      <button class="btn" id="btn-export">⬇️ Exportar CSV</button>
    </div>
  </div>

</div>

<script>
/* ============================================================
   SIMULADOR DE ESTACIÓN METEOROLÓGICA - GEMINI EDITION
   Motor Isométrico 2.5D + Datalogger
   ============================================================ */

const MathUtils = {
    lerp: (a, b, t) => a + (b - a) * t,
    clamp: (v, min, max) => Math.max(min, Math.min(max, v)),
    dirStr: (deg) => {
        const dirs = ['N','NE','E','SE','S','SO','O','NO'];
        return `${dirs[Math.round(deg/45)%8]}`;
    },
    randomRange: (min, max) => Math.random() * (max - min) + min
};

/** Proyección Isométrica Simple */
class Iso {
    static project(x, y, z) {
        // Rotación 45 grados y escala isométrica estándar
        const cx = (x - y) * Math.cos(Math.PI/6);
        const cy = (x + y) * Math.sin(Math.PI/6) - z;
        return { x: cx, y: cy };
    }
}

/** Entorno Climático Global */
class Environment {
    constructor() {
        this.time = 12; // 0-24
        this.windSpd = 15; // km/h
        this.windDir = 45; // grados (N=0, E=90)
        this.rainRate = 0; // mm/h
        this.baseTemp = 22; // °C
        
        this.sunAltitude = 0; // Grados sobre el horizonte
        this.sunIntensity = 0; // 0-1
        this.ambientLight = '#ffffff';
    }

    update(dt) {
        // Calcular posición del sol (simplificado)
        // A las 12:00, altitud = 90. A las 6:00 y 18:00, altitud = 0.
        this.sunAltitude = Math.sin((this.time - 6) / 12 * Math.PI) * 90;
        
        // Intensidad y atenuación por lluvia
        let rawIntensity = MathUtils.clamp(this.sunAltitude / 45, 0, 1);
        const cloudCover = MathUtils.clamp(this.rainRate / 20, 0, 0.8); // La lluvia trae nubes
        this.sunIntensity = rawIntensity * (1 - cloudCover);

        // Colores del cielo
        let skyGradient;
        if (this.sunAltitude > 20) {
            skyGradient = cloudCover > 0.5 ? 'linear-gradient(180deg, #5a6b7c, #8ca1b5)' : 'linear-gradient(180deg, #1d73c8, #6db3f2)';
        } else if (this.sunAltitude > 0) {
            skyGradient = 'linear-gradient(180deg, #2c3e50, #e67e22)'; // Atardecer/Amanecer
        } else {
            skyGradient = 'linear-gradient(180deg, #03070b, #112233)'; // Noche
        }
        document.getElementById('sky-bg').style.background = skyGradient;
    }
}

/** Físicas y Sensores de la Estación */
class Station {
    constructor(env) {
        this.env = env;
        
        // Datos registrados por la estación (simulados)
        this.data = {
            temp: 0,
            humidity: 0,
            pressure: 1013,
            windSpd: 0,
            windDir: 0,
            rainAcum: 0,
            radiation: 0
        };

        // Estado visual animado
        this.anemometerAngle = 0;
        this.vaneAngle = 0;
    }

    update(dt) {
        // Físicas del Anemómetro (gira según viento)
        // 1 km/h = ~ x radianes por segundo
        const rotationSpeed = this.env.windSpd * 0.1; 
        this.anemometerAngle += rotationSpeed * dt;

        // Físicas de la Veleta (apunta al viento con cierta inercia)
        let targetRad = this.env.windDir * Math.PI / 180;
        // Interpolación simple de ángulo
        this.vaneAngle = this.env.windDir * Math.PI / 180; // Simplificado para que responda directo

        // --- LÓGICA DE SENSORES ---
        // 1. Pluviómetro
        this.data.rainAcum += (this.env.rainRate / 3600) * dt; // mm/s

        // 2. Temperatura (Base + efecto solar - efecto viento/lluvia)
        const heatEffect = this.env.sunIntensity * 5;
        const coolEffect = (this.env.rainRate > 0 ? 3 : 0) + (this.env.windSpd * 0.05);
        this.data.temp = MathUtils.lerp(this.data.temp, this.env.baseTemp + heatEffect - coolEffect, dt * 0.5);

        // 3. Humedad (Inversa a temperatura, alta con lluvia)
        let targetHum = 50 - heatEffect * 2 + (this.env.rainRate > 0 ? 40 : 0);
        this.data.humidity = MathUtils.lerp(this.data.humidity, MathUtils.clamp(targetHum, 20, 100), dt * 0.5);

        // 4. Radiación (W/m2)
        // Máximo teórico en superficie clara ~ 1000 W/m2
        this.data.radiation = this.env.sunIntensity * 1000;

        // 5. Viento (con pequeñas ráfagas)
        const gust = (Math.random() - 0.5) * (this.env.windSpd * 0.2);
        this.data.windSpd = MathUtils.clamp(this.env.windSpd + gust, 0, 200);
        this.data.windDir = this.env.windDir;

        // 6. Presión (baja con lluvia)
        let targetPres = 1015 - (this.env.rainRate * 0.5);
        this.data.pressure = MathUtils.lerp(this.data.pressure, targetPres, dt * 0.1);
    }
}

/** Sistema de Partículas (Lluvia) */
class ParticleSystem {
    constructor() {
        this.drops = [];
    }
    update(dt, env) {
        if (env.rainRate > 0) {
            // Emitir gotas según rainRate
            const dropsToEmit = Math.floor(env.rainRate * dt * 20);
            for (let i = 0; i < dropsToEmit; i++) {
                this.drops.push({
                    x: MathUtils.randomRange(-300, 300),
                    y: MathUtils.randomRange(-300, 300),
                    z: 500,
                    spd: MathUtils.randomRange(400, 600)
                });
            }
        }

        // Actualizar gotas
        // El viento empuja las gotas
        const vx = Math.cos(env.windDir * Math.PI / 180) * env.windSpd * 2;
        const vy = Math.sin(env.windDir * Math.PI / 180) * env.windSpd * 2;

        for (let i = this.drops.length - 1; i >= 0; i--) {
            let p = this.drops[i];
            p.z -= p.spd * dt;
            p.x += vx * dt;
            p.y += vy * dt;
            if (p.z < 0) {
                this.drops.splice(i, 1);
            }
        }
    }
}

/** Renderizador Isométrico Canvas 2.5D */
class Renderer {
    constructor(canvas, env, station, particles) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d', { alpha: true });
        this.env = env;
        this.station = station;
        this.particles = particles;
        this.W = 0; this.H = 0;
        
        window.addEventListener('resize', () => this.resize());
        this.resize();
    }

    resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        this.W = this.canvas.clientWidth;
        this.H = this.canvas.clientHeight;
        this.canvas.width = this.W * dpr;
        this.canvas.height = this.H * dpr;
        this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // Funciones primitivas de dibujo isométrico
    drawBox(ox, oy, oz, w, l, h, colorTop, colorSide1, colorSide2) {
        const ctx = this.ctx;
        const p1 = Iso.project(ox, oy, oz);
        const p2 = Iso.project(ox+w, oy, oz);
        const p3 = Iso.project(ox+w, oy+l, oz);
        const p4 = Iso.project(ox, oy+l, oz);
        const p5 = Iso.project(ox, oy, oz+h);
        const p6 = Iso.project(ox+w, oy, oz+h);
        const p7 = Iso.project(ox+w, oy+l, oz+h);
        const p8 = Iso.project(ox, oy+l, oz+h);

        // Draw side 1 (y-axis plane)
        ctx.fillStyle = colorSide1;
        ctx.beginPath(); ctx.moveTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p7.x, p7.y); ctx.lineTo(p6.x, p6.y); ctx.fill();
        
        // Draw side 2 (x-axis plane)
        ctx.fillStyle = colorSide2;
        ctx.beginPath(); ctx.moveTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.lineTo(p8.x, p8.y); ctx.lineTo(p7.x, p7.y); ctx.fill();

        // Draw top
        ctx.fillStyle = colorTop;
        ctx.beginPath(); ctx.moveTo(p5.x, p5.y); ctx.lineTo(p6.x, p6.y); ctx.lineTo(p7.x, p7.y); ctx.lineTo(p8.x, p8.y); ctx.fill();
    }

    render() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.W, this.H);
        
        ctx.save();
        ctx.translate(this.W/2, this.H/2 + 100); // Centrar isométrico

        // 1. Suelo
        ctx.fillStyle = '#1c2820'; // Base ground
        ctx.beginPath();
        const g0 = Iso.project(-300, -300, 0), g1 = Iso.project(300, -300, 0), g2 = Iso.project(300, 300, 0), g3 = Iso.project(-300, 300, 0);
        ctx.moveTo(g0.x, g0.y); ctx.lineTo(g1.x, g1.y); ctx.lineTo(g2.x, g2.y); ctx.lineTo(g3.x, g3.y); ctx.fill();

        // Grid lines
        ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
        for(let i=-300; i<=300; i+=50) {
            let l1 = Iso.project(i, -300, 0), l2 = Iso.project(i, 300, 0);
            ctx.beginPath(); ctx.moveTo(l1.x, l1.y); ctx.lineTo(l2.x, l2.y); ctx.stroke();
            let l3 = Iso.project(-300, i, 0), l4 = Iso.project(300, i, 0);
            ctx.beginPath(); ctx.moveTo(l3.x, l3.y); ctx.lineTo(l4.x, l4.y); ctx.stroke();
        }

        // Iluminación dinámica
        const isNight = this.env.sunIntensity < 0.1;
        const cMastTop = isNight ? '#334' : '#bdc3c7';
        const cMastSide = isNight ? '#112' : '#7f8c8d';

        // 2. Base de concreto
        this.drawBox(-20, -20, 0, 40, 40, 5, '#555', '#333', '#222');

        // 3. Mástil Principal
        this.drawBox(-4, -4, 5, 8, 8, 200, cMastTop, cMastSide, cMastSide);

        // 4. Gabinete (Datalogger)
        this.drawBox(-15, 6, 60, 30, 20, 40, '#ecf0f1', '#bdc3c7', '#95a5a6');
        
        // 5. Panel Solar (Inclinado)
        ctx.save();
        const pSol = Iso.project(-10, -25, 120);
        ctx.translate(pSol.x, pSol.y);
        ctx.fillStyle = '#2980b9'; // Solar cell color
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(25, -15); ctx.lineTo(35, -5); ctx.lineTo(10, 10); ctx.fill();
        ctx.strokeStyle = '#ecf0f1'; ctx.lineWidth = 2; ctx.stroke();
        ctx.restore();

        // 6. Brazo del Pluviómetro
        this.drawBox(-4, -40, 150, 8, 36, 4, cMastTop, cMastSide, cMastSide);
        // Cilindro del pluviómetro (aproximado isométrica)
        const pRain = Iso.project(0, -45, 154);
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse(pRain.x, pRain.y, 10, 5, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ccc';
        ctx.fillRect(pRain.x-10, pRain.y, 20, 25);
        ctx.fillStyle = '#888';
        ctx.beginPath(); ctx.ellipse(pRain.x, pRain.y+25, 10, 5, 0, 0, Math.PI*2); ctx.fill();

        // 7. Brazo de Viento (Anemómetro y Veleta) a tope del mástil
        this.drawBox(-40, -4, 205, 80, 8, 4, cMastTop, cMastSide, cMastSide);
        
        // Cazoletas del Anemómetro (Izquierda)
        const pAne = Iso.project(-35, 0, 209);
        ctx.fillStyle = '#e74c3c';
        ctx.save();
        ctx.translate(pAne.x, pAne.y);
        ctx.fillRect(-2, -10, 4, 10); // eje
        for(let i=0; i<3; i++) {
            const ang = this.station.anemometerAngle + (i*Math.PI*2/3);
            const cx = Math.cos(ang)*15, cy = Math.sin(ang)*10;
            ctx.beginPath(); ctx.arc(cx, cy - 10, 4, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#333'; ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(cx, cy-10); ctx.stroke();
        }
        ctx.restore();

        // Veleta (Derecha)
        const pVane = Iso.project(35, 0, 209);
        ctx.save();
        ctx.translate(pVane.x, pVane.y);
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(-2, -10, 4, 10); // eje
        
        // Rotar veleta (isométrica aproximada proyectando el vector)
        const vx = Math.cos(this.station.vaneAngle);
        const vy = Math.sin(this.station.vaneAngle);
        const vp = Iso.project(vx*20, vy*20, 0);
        ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 4; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-vp.x, -vp.y-10); ctx.lineTo(vp.x, vp.y-10); ctx.stroke();
        // Cola de la veleta
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath(); ctx.moveTo(-vp.x, -vp.y-10); ctx.lineTo(-vp.x - vp.x*0.5, -vp.y - 5); ctx.lineTo(-vp.x - vp.x*0.5, -vp.y - 15); ctx.fill();
        ctx.restore();


        // 8. Abrigo Meteorológico (Platos)
        this.drawBox(10, -4, 120, 15, 15, 25, '#fff', '#e0e0e0', '#d0d0d0');

        // 9. Lluvia (Partículas)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (const drop of this.particles.drops) {
            const dp1 = Iso.project(drop.x, drop.y, drop.z);
            const dp2 = Iso.project(drop.x, drop.y, drop.z - 20); // Trail
            ctx.moveTo(dp1.x, dp1.y); ctx.lineTo(dp2.x, dp2.y);
        }
        ctx.stroke();

        ctx.restore();
    }
}

/** Sistema de Datos e Interfaz */
class DataLogger {
    constructor(station) {
        this.station = station;
        this.history = [];
        this.lastSample = 0;
        
        this.els = {
            temp: document.getElementById('out-temp'),
            hum: document.getElementById('out-hum'),
            pres: document.getElementById('out-pres'),
            wind: document.getElementById('out-wind'),
            rain: document.getElementById('out-rain'),
            rad: document.getElementById('out-rad'),
            forecast: document.getElementById('out-forecast')
        };

        this.radarCtx = document.getElementById('radar-canvas').getContext('2d');
        document.getElementById('btn-export').addEventListener('click', () => this.exportCSV());
    }

    update(now) {
        // Samplear cada 1 segundo real
        if (now - this.lastSample > 1000) {
            this.lastSample = now;
            const record = {
                time: new Date().toLocaleTimeString(),
                temp: this.station.data.temp.toFixed(1),
                hum: this.station.data.humidity.toFixed(0),
                pres: this.station.data.pressure.toFixed(1),
                windSpd: this.station.data.windSpd.toFixed(1),
                windDir: this.station.data.windDir,
                rain: this.station.data.rainAcum.toFixed(1),
                rad: this.station.data.radiation.toFixed(0)
            };
            this.history.push(record);
            
            this.updateDOM(record);
            this.updateForecast();
        }
        this.drawRadar(now);
    }

    updateDOM(d) {
        this.els.temp.textContent = d.temp;
        this.els.hum.textContent = d.hum;
        this.els.pres.textContent = d.pres;
        this.els.wind.textContent = d.windSpd;
        this.els.rain.textContent = d.rain;
        this.els.rad.textContent = d.rad;
    }

    updateForecast() {
        const press = this.station.data.pressure;
        const hum = this.station.data.humidity;
        let text = "⛅ Estable";
        if (press < 1010 && hum > 70) text = "🌧️ Lluvia inminente";
        else if (press > 1018 && hum < 50) text = "☀️ Despejado y seco";
        else if (this.station.env.windSpd > 40) text = "💨 Alerta de vientos";
        this.els.forecast.textContent = text;
    }

    drawRadar(now) {
        const ctx = this.radarCtx;
        const canvas = ctx.canvas;
        if(canvas.width !== canvas.clientWidth) { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
        
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        // Dibujar ecos de lluvia
        if (this.station.env.rainRate > 0) {
            ctx.fillStyle = this.station.env.rainRate > 25 ? 'rgba(255, 0, 0, 0.4)' : 'rgba(0, 255, 0, 0.4)';
            const offset = (now/2000) % (Math.PI*2);
            ctx.beginPath();
            ctx.arc(cx + Math.cos(offset)*10, cy + Math.sin(offset)*10, 30 + this.station.env.rainRate, 0, Math.PI*2);
            ctx.fill();
        }

        // Barrido
        const angle = (now / 1000) % (Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 210, 255, 0.3)';
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, 100, angle, angle + 0.5);
        ctx.closePath();
        ctx.fill();
        
        // Estación en el centro
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI*2); ctx.fill();
    }

    exportCSV() {
        if (this.history.length === 0) return alert('No hay datos registrados aún.');
        const headers = ['Hora', 'Temp(°C)', 'Hum(%)', 'Presion(hPa)', 'Viento(km/h)', 'Dir(°)', 'Lluvia(mm)', 'Radiacion(W/m2)'];
        const csvRows = [headers.join(',')];
        
        for (const row of this.history) {
            csvRows.push(`${row.time},${row.temp},${row.hum},${row.pres},${row.windSpd},${row.windDir},${row.rain},${row.rad}`);
        }
        
        const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `estacion_meteorologica_${new Date().getTime()}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
}

/** Bucle Principal y Enlace con UI */
class App {
    constructor() {
        this.env = new Environment();
        this.station = new Station(this.env);
        this.particles = new ParticleSystem();
        this.renderer = new Renderer(document.getElementById('canvas3d'), this.env, this.station, this.particles);
        this.logger = new DataLogger(this.station);
        
        this.lastTime = performance.now();
        this.bindUI();
        requestAnimationFrame((t) => this.loop(t));
    }

    bindUI() {
        const bindSlider = (id, outId, envKey, suffix, fmt = (v)=>v) => {
            const el = document.getElementById(id);
            const out = document.getElementById(outId);
            el.addEventListener('input', () => {
                const val = parseFloat(el.value);
                this.env[envKey] = val;
                out.textContent = fmt(val) + suffix;
            });
        };

        const formatTime = (v) => {
            let h = Math.floor(v), m = Math.floor((v%1)*60);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
        };

        bindSlider('in-time', 'val-time', 'time', '', formatTime);
        bindSlider('in-wind-spd', 'val-wind', 'windSpd', ' km/h');
        bindSlider('in-wind-dir', 'val-wind-dir', 'windDir', '', v => `${v}° ${MathUtils.dirStr(v)}`);
        bindSlider('in-rain', 'val-rain', 'rainRate', ' mm/h');
        bindSlider('in-temp', 'val-temp', 'baseTemp', ' °C', v => v.toFixed(1));
    }

    loop(now) {
        const dt = Math.min(0.1, (now - this.lastTime) / 1000);
        this.lastTime = now;

        this.env.update(dt);
        this.station.update(dt);
        this.particles.update(dt, this.env);
        
        this.renderer.render();
        this.logger.update(now);

        requestAnimationFrame((t) => this.loop(t));
    }
}

// Iniciar aplicación
window.addEventListener('DOMContentLoaded', () => {
    window.app = new App();
});
</script>
